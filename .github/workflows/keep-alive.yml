name: Supabase Keep Alive

on:
  schedule:
    # 매주 월, 수, 금요일 자정(UTC 기준)에 실행 (필요에 따라 주기 변경 가능)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # GitHub Actions 탭에서 수동으로 실행할 수 있게 해줍니다.

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Keep-Alive API
        # 실제 배포된 서비스의 도메인으로 변경해주세요. (예: https://my-plant-app.vercel.app)
        run: |
          curl -X GET "https://[배포된-서비스-도메인]/api/keep-alive"
